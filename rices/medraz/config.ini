[global/wm]

margin-bottom = 0
margin-top = 0

include-file = ../../config/system.ini
include-file = modules.ini

[color]
bg = #0d0d0d
fg = #f5f5f5
mb = #1a1a1a

red = #e53935
pink = #FF0677
purple = #b71c1c
blue = #448aff
blue-arch = #0A9CF5
cyan = #82b1ff
teal = #40c4ff
green = #c62828
lime = #ffcdd2
yellow = #ff5252
amber = #ff8a80
orange = #E57C46
brown = #AC8476
grey = #9e9e9e
indigo = #536dfe
blue-gray = #607d8b

[bar/medraz-bar]
monitor = ${env:MONITOR:}
monitor-strict = false
override-redirect = false

bottom = false
fixed-center = true

width = 100%
height = 22

offset-x = 0%
offset-y = 0

background = ${color.bg}
foreground = ${color.fg}

radius = 0.0

line-size = 2
line-color = ${color.red}

border-size = 0px
border-color = ${color.bg}

padding = 1

module-margin-left = 0
module-margin-right = 0

; Text
font-0 = "JetBrainsMono:style=Bold:pixelsize=9;3"
; Icons
font-1 = "Font Awesome 6 Free Solid:size=10;3"
font-2 = "Material Design Icons Desktop:size=11;3"
font-3 = "Material Design Icons Desktop:size=15;4"
; Glyphs
font-4 = "MesloLGS NF:style=Regular:pixelsize=17;4"
dpi = 96

;Modules availables but not active:
;		brightness		weather		xkeyboard
modules-left = launcher dots bi cpu_bar bd sep bi memory_bar bd sep bi filesystem bd sep bi mpd_control bd
modules-center = bi bspwm bd
modules-right = mplayer sep mpd sep bluetooth sep bi battery network bd sep bi pulseaudio bd sep bi updates bd sep bi date bd sep tray sep power

separator =
dim-value = 1.0

;;locale = es_MX.UTF-8

wm-restack = bspwm
enable-ipc = true

cursor-click = pointer
cursor-scroll =

[settings]

screenchange-reload = false

compositing-background = source
compositing-foreground = over
compositing-overline = over
compositing-underline = over
compositing-border = over

pseudo-transparency = false
